services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bitly
      POSTGRES_PASSWORD: bitly
      POSTGRES_DB: bitly
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitly"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    ports:
      - "${APP_PORT:-8010}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bitly:bitly@db:5432/bitly
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-10}
      RATE_LIMIT_WINDOW_S: ${RATE_LIMIT_WINDOW_S:-1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn src.bitly.main:app --host 0.0.0.0 --port 8000
      "
    restart: unless-stopped

volumes:
  pgdata:
