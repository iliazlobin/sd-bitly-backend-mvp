name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 7 * * *'

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test deps
        run: pip install httpx pytest

      - name: Source manifest
        run: |
          set -a
          source verify/manifest.env
          echo "PORT=${PORT}"
          echo "MODE=${MODE}"

      # ── Phase 1: all acceptance tests EXCEPT rate-limit, with high limit from manifest ──
      - name: Start stack (high rate limit)
        run: |
          set -a
          source verify/manifest.env
          cat > .env << COMPOSEENV
          RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS}
          RATE_LIMIT_WINDOW_S=${RATE_LIMIT_WINDOW_S}
          COMPOSEENV
          eval "$UP"

      - name: Wait for health (phase 1)
        run: |
          set -a
          source verify/manifest.env
          for i in $(seq 1 30); do
            if eval "$READY"; then
              echo "Healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "=== Health check failed after 30s ==="
          docker compose logs app --tail=100
          exit 1

      - name: Run acceptance tests (excl. rate-limit)
        run: |
          set -a
          source verify/manifest.env
          API_BASE_URL="http://localhost:${PORT}" python -m pytest verify/acceptance/ -v --tb=line \
            -k "not test_rate_limit" 2>&1 || {
              echo "::error ::Non-rate-limit acceptance tests FAILED"
              exit 1
            }

      - name: Tear down (phase 1)
        run: |
          set -a
          source verify/manifest.env
          eval "$DOWN"

      # ── Phase 2: rate-limit test only, with production limit ──
      - name: Start stack (production rate limit)
        run: |
          set -a
          source verify/manifest.env
          # Unset rate limit vars from manifest so .env file takes precedence
          unset RATE_LIMIT_REQUESTS RATE_LIMIT_WINDOW_S
          cat > .env << COMPOSEENV
          RATE_LIMIT_REQUESTS=10
          RATE_LIMIT_WINDOW_S=1
          COMPOSEENV
          eval "$UP"

      - name: Wait for health (phase 2)
        run: |
          set -a
          source verify/manifest.env
          for i in $(seq 1 30); do
            if eval "$READY"; then
              echo "Healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "=== Health check failed after 30s ==="
          docker compose logs app --tail=100
          exit 1

      - name: Run rate-limit acceptance test
        run: |
          set -a
          source verify/manifest.env
          API_BASE_URL="http://localhost:${PORT}" python -m pytest \
            verify/acceptance/test_fr1_create.py::test_rate_limit_exceeded -v --tb=line 2>&1 || {
              echo "::error ::Rate-limit acceptance test FAILED"
              exit 1
            }

      - name: Tear down (phase 2)
        if: always()
        run: |
          set -a
          source verify/manifest.env
          eval "$DOWN"
