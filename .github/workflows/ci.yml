name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 7 * * *'

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test deps
        run: pip install httpx pytest

      - name: Source manifest
        run: |
          set -a
          source verify/manifest.env
          echo "PORT=${PORT}"
          echo "MODE=${MODE}"

      - name: Start stack
        run: |
          set -a
          source verify/manifest.env
          eval "$UP"

      - name: Wait for health
        run: |
          set -a
          source verify/manifest.env
          for i in $(seq 1 30); do
            if eval "$READY"; then
              echo "Healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Health check failed after 30s"
          exit 1

      - name: Run acceptance tests
        run: |
          set -a
          source verify/manifest.env
          eval "$ACCEPTANCE"

      - name: Tear down
        if: always()
        run: |
          set -a
          source verify/manifest.env
          eval "$DOWN"
