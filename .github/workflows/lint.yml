name: Lint

on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * *'

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.8.0"
          args: "check"
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.8.0"
          args: "format --check"
