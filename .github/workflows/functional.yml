name: Functional

on:
  push:
  pull_request:
  schedule:
    - cron: '0 8 * * *'

jobs:
  functional:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bitly
          POSTGRES_PASSWORD: bitly
          POSTGRES_DB: bitly
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://bitly:bitly@localhost:5432/bitly

      - name: Run functional tests
        run: pytest tests/functional/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://bitly:bitly@localhost:5432/bitly
