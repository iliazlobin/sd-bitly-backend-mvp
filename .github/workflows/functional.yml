name: Functional

on:
  push:
  pull_request:
  schedule:
    - cron: '0 8 * * *'

jobs:
  functional:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run functional tests
        run: pytest tests/functional/ -v
